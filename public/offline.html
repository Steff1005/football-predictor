<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kickoff — Немає з'єднання</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#030712;color:#f9fafb;font-family:Arial,Helvetica,sans-serif;padding:1.5rem;text-align:center}
    .logo{width:64px;height:64px;background:#16a34a;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;font-size:2rem}
    h1{font-size:1.25rem;font-weight:700;margin-bottom:.5rem;color:#f9fafb}
    p{font-size:.9rem;color:#9ca3af;margin-bottom:2rem;max-width:280px}
    button{background:#16a34a;color:#fff;border:none;padding:.75rem 2rem;border-radius:.75rem;font-size:.95rem;font-weight:600;cursor:pointer;transition:background .15s}
    button:hover{background:#15803d}
    .icon{font-size:3rem;margin-bottom:1rem;display:block}
  </style>
</head>
<body>
  <div class="logo">⚽</div>
  <span class="icon">📡</span>
  <h1>Немає з'єднання</h1>
  <p>Перевір підключення до інтернету і спробуй знову</p>
  <button onclick="location.reload()">Оновити сторінку</button>
</body>
</html>
